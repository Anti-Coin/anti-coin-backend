version: "3.8"

# Local smoke override.
# NOTE:
#   - 이 파일은 base compose를 대체하지 않는다.
#   - 반드시 `-f docker-compose.yml -f docker-compose.local.yml` 순서로 함께 사용한다.
# Usage example:
#   docker compose -f docker-compose.yml -f docker-compose.local.yml --env-file .env.prod up -d --build
#   docker compose -f docker-compose.yml -f docker-compose.local.yml --env-file .env.prod --profile ops-train run --rm worker-train

services:
  fastapi:
    image: coin-local-fastapi:dev
    build:
      context: .
      dockerfile: docker/Dockerfile.fastapi
    depends_on:
      influxdb:
        condition: service_healthy

  streamlit:
    image: coin-local-streamlit:dev
    build:
      context: .
      dockerfile: docker/Dockerfile.streamlit

  worker-ingest:
    image: coin-local-worker:dev
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    depends_on:
      influxdb:
        condition: service_healthy

  worker-train:
    image: coin-local-worker:dev
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    depends_on:
      influxdb:
        condition: service_healthy

  monitor:
    image: coin-local-worker:dev
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    depends_on:
      influxdb:
        condition: service_healthy
      worker-ingest:
        condition: service_started
